query GetSites {
    GetSites {
        Available
        DisplayGroup
        Latitude
        Location
        LoggerId
        Longitude
        Note
        SiteId
        Status
        Type
        _id
        Prioritize
        IsScadaMeter
        IsManualMeter
        IsShowLabel
        TimeDelay
        IsDNP
        IsHWM
        StartHour
    }
}


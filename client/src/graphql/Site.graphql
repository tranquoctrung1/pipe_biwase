mutation InsertSite($site: SiteInsertInput) {
    InsertSite(site: $site)
}

mutation UpdateSite($site: SiteUpdateInput) {
    UpdateSite(site: $site)
}

mutation DeleteSite($site: SiteUpdateInput) {
    DeleteSite(site: $site)
}

query GetDataLoggerByTimeStamp(
    $channelid: String
    $start: String
    $end: String
) {
    GetDataLoggerByTimeStamp(channelid: $channelid, start: $start, end: $end) {
        BaseMax
        BaseMin
        ChannelId
        ChannelName
        ListDataLogger {
            TimeStamp
            Value
        }
        Unit
    }
}

